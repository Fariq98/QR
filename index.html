<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play & Continue</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    padding:20px;
}

button{
    background:#ff0000;
    color:#fff;
    border:none;
    padding:15px 35px;
    font-size:20px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>
</head>
<body>

<div class="container">
    <h1>🎵 Tap to Play & Continue</h1>
    <p>The music will start, then you'll be redirected in a new tab.</p>

    <button onclick="start()">▶ Play</button>

    <audio id="music">
        <source src="song.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
function start(){
    const music = document.getElementById("music");

    music.play();

    setTimeout(function(){
        // Opens the URL in a new browser tab
        window.open("https://youtube.com/@fariq98", "_blank");
    }, 1000);
}
</script>

</body>
</html>
